<svg width="1180" height="610" viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- background -->
    <radialGradient id="bgGlowBlue" cx="15%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowPurple" cx="85%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowEmerald" cx="75%" cy="90%" r="45%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0.92"/>
    </linearGradient>

    <!-- shimmering border -->
    <linearGradient id="borderShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="45%" stop-color="#7C3AED" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#22D3EE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1200 0;1200 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- ascii flowing gradient -->
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0 0;-260 0;0 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <linearGradient id="pillBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="pulseGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2">
        <animate attributeName="stdDeviation" values="1.5;4;1.5" dur="2.6s" repeatCount="indefinite"/>
      </feGaussianBlur>
    </filter>

    <clipPath id="outerClip">
      <rect x="4" y="4" width="1172" height="602" rx="26"/>
    </clipPath>
    <clipPath id="leftClip">
      <rect x="4" y="4" width="448" height="602" rx="26"/>
    </clipPath>
  </defs>

  <!-- BASE BACKGROUND -->
  <rect width="1180" height="610" rx="28" fill="#030712"/>
  <g clip-path="url(#outerClip)">
    <rect width="1180" height="610" fill="#030712"/>
    <rect width="1180" height="610" fill="url(#bgGlowBlue)"/>
    <rect width="1180" height="610" fill="url(#bgGlowPurple)"/>
    <rect width="1180" height="610" fill="url(#bgGlowEmerald)"/>

    <!-- floating particles -->
    <g fill="#22D3EE">
      <circle cx="120" cy="500" r="1.6" opacity="0.5">
        <animateMotion path="M0,0 C 20,-40 -20,-80 0,-140" dur="9s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="360" cy="120" r="1.3" opacity="0.4" fill="#7C3AED">
        <animateMotion path="M0,0 C -30,30 20,70 -10,120" dur="11s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="900" cy="80" r="1.5" opacity="0.4" fill="#10B981">
        <animateMotion path="M0,0 C 30,40 -10,90 20,150" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.55;0.1" dur="3.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1050" cy="480" r="1.4" opacity="0.4" fill="#22D3EE">
        <animateMotion path="M0,0 C -20,-30 10,-70 -20,-110" dur="8.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="700" cy="550" r="1.2" opacity="0.35" fill="#7C3AED">
        <animateMotion path="M0,0 C 10,-30 -20,-60 5,-100" dur="12s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.08;0.45;0.08" dur="4.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- divider -->
    <line x1="452" y1="36" x2="452" y2="574" stroke="#7C3AED" stroke-opacity="0.18" stroke-width="1"/>

    <!-- ============ LEFT: ASCII PORTRAIT ============ -->
    <g clip-path="url(#leftClip)">
      <!-- scanline sweep -->
      <rect x="4" y="0" width="448" height="46" fill="url(#scanGrad)">
        <animate attributeName="y" values="-46;610" dur="5s" repeatCount="indefinite"/>
      </rect>

      <g font-family="'Courier New', monospace" font-size="13" text-anchor="middle" fill="url(#asciiGrad)" filter="url(#softGlow)">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur="5s" repeatCount="indefinite" additive="sum"/>

        <text x="228" y="150" opacity="0"> .-------------------. <animate attributeName="opacity" begin="0.1s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="166" opacity="0">/  .---------------.  \<animate attributeName="opacity" begin="0.35s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="182" opacity="0">|  |   ▄▄     ▄▄    |  |<animate attributeName="opacity" begin="0.6s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="198" opacity="0">|  |   ██     ██    |  |<animate attributeName="opacity" begin="0.85s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="214" opacity="0">|  |                |  |<animate attributeName="opacity" begin="1.1s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="230" opacity="0">|  |      ____      |  |<animate attributeName="opacity" begin="1.35s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="246" opacity="0">|  |     /    \     |  |<animate attributeName="opacity" begin="1.6s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="262" opacity="0">|  '---------------'  |<animate attributeName="opacity" begin="1.85s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="278" opacity="0"> \                   / <animate attributeName="opacity" begin="2.1s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="294" opacity="0">  '-------------------'<animate attributeName="opacity" begin="2.35s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="330" opacity="0" font-size="14">&gt; whoami<animate attributeName="opacity" begin="2.7s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="350" opacity="0" font-size="14">yoner_isaza<animate attributeName="opacity" begin="2.95s" dur="0.6s" to="1" fill="freeze"/></text>
        <text x="228" y="370" opacity="0" font-size="13">systems.engineer()<animate attributeName="opacity" begin="3.2s" dur="0.6s" to="1" fill="freeze"/></text>
      </g>

      <!-- blinking cursor -->
      <rect x="308" y="360" width="9" height="14" fill="#22D3EE" opacity="0">
        <animate attributeName="opacity" begin="3.6s" values="0;1;1;0;0" keyTimes="0;0.02;0.5;0.52;1" dur="1s" repeatCount="indefinite"/>
      </rect>

      <text x="228" y="440" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94A3B8" opacity="0" letter-spacing="2">
        SYSTEMS ENGINEER · COLOMBIA
        <animate attributeName="opacity" begin="4s" dur="1s" to="1" fill="freeze"/>
      </text>
    </g>

    <!-- ============ RIGHT: TERMINAL ============ -->
    <g font-family="'Segoe UI', system-ui, sans-serif">
      <!-- terminal chrome -->
      <rect x="480" y="36" width="666" height="34" rx="10" fill="#0B1120" opacity="0.7"/>
      <circle cx="500" cy="53" r="5" fill="#EF4444" opacity="0.85"/>
      <circle cx="518" cy="53" r="5" fill="#F59E0B" opacity="0.85"/>
      <circle cx="536" cy="53" r="5" fill="#10B981" opacity="0.85"/>
      <text x="813" y="58" text-anchor="middle" font-size="12" fill="#94A3B8" font-family="'Courier New', monospace">yoner@github :: ~ portfolio</text>

      <!-- greeting -->
      <text x="480" y="118" font-size="20" fill="#F8FAFC" opacity="0">Hi 👋
        <animate attributeName="opacity" begin="0.3s" dur="0.5s" to="1" fill="freeze"/>
      </text>

      <g clip-path="url(#nameClip)">
        <text x="480" y="156" font-size="32" font-weight="700" fill="url(#accentGrad)">I'm Yoner Isaza</text>
      </g>
      <clipPath id="nameClip">
        <rect x="475" y="128" width="0" height="40">
          <animate attributeName="width" begin="0.9s" dur="1s" to="330" fill="freeze"/>
        </rect>
      </clipPath>

      <!-- rotating roles -->
      <g font-family="'Courier New', monospace" font-size="18" fill="#22D3EE">
        <text x="480" y="196" opacity="0">&gt;<tspan dx="8" fill="#F8FAFC">Frontend Engineer<animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.02;0.18;0.2" dur="12.5s" begin="0s" repeatCount="indefinite" fill="freeze"/></tspan></text>
        <text x="480" y="196" fill="#F8FAFC" opacity="0"><tspan dx="20">Full Stack Developer<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.22;0.38;0.4" dur="12.5s" begin="0s" repeatCount="indefinite"/></tspan></text>
        <text x="480" y="196" fill="#F8FAFC" opacity="0"><tspan dx="20">Open Source Contributor<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.42;0.58;0.6" dur="12.5s" begin="0s" repeatCount="indefinite"/></tspan></text>
        <text x="480" y="196" fill="#F8FAFC" opacity="0"><tspan dx="20">UI Engineer<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.6;0.62;0.78;0.8" dur="12.5s" begin="0s" repeatCount="indefinite"/></tspan></text>
        <text x="480" y="196" fill="#F8FAFC" opacity="0"><tspan dx="20">AI Enthusiast<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.8;0.82;0.98;1" dur="12.5s" begin="0s" repeatCount="indefinite"/></tspan></text>
        <rect x="474" y="184" width="8" height="16" fill="#22D3EE">
          <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- info list -->
      <g font-size="14" fill="#F8FAFC">
        <g opacity="0">
          <animate attributeName="opacity" begin="1.6s" dur="0.5s" to="1" fill="freeze"/>
          <rect x="480" y="228" width="6" height="6" fill="#7C3AED" transform="rotate(45 483 231)"/>
          <text x="496" y="235"><tspan fill="#94A3B8">Location </tspan>Colombia</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="1.9s" dur="0.5s" to="1" fill="freeze"/>
          <rect x="480" y="252" width="6" height="6" fill="#22D3EE" transform="rotate(45 483 255)"/>
          <text x="496" y="259"><tspan fill="#94A3B8">Education </tspan>Systems Engineering</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="2.2s" dur="0.5s" to="1" fill="freeze"/>
          <rect x="480" y="276" width="6" height="6" fill="#10B981" transform="rotate(45 483 279)"/>
          <text x="496" y="283"><tspan fill="#94A3B8">Focus </tspan>AI / ML · Full-Stack Systems</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="2.5s" dur="0.5s" to="1" fill="freeze"/>
          <rect x="480" y="300" width="6" height="6" fill="#7C3AED" transform="rotate(45 483 303)"/>
          <text x="496" y="307"><tspan fill="#94A3B8">Portfolio </tspan>github.com/y0ner</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="2.8s" dur="0.5s" to="1" fill="freeze"/>
          <rect x="480" y="324" width="6" height="6" fill="#22D3EE" transform="rotate(45 483 327)"/>
          <text x="496" y="331"><tspan fill="#94A3B8">Email </tspan>yonerisaza0@gmail.com</text>
        </g>
      </g>

      <!-- skills label -->
      <text x="480" y="368" font-size="12" letter-spacing="2" fill="#94A3B8" opacity="0">
        SKILLS
        <animate attributeName="opacity" begin="3.1s" dur="0.5s" to="1" fill="freeze"/>
      </text>

      <!-- skill icons (2 rows × 5 cols, 48x48 each) -->
      <g>
        <!-- row 1 -->
        <g opacity="0">
          <animate attributeName="opacity" begin="3.3s" dur="0.4s" to="1" fill="freeze"/>
          <image href="icons/react.svg" x="480" y="380" width="48" height="48"/>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="3.4s" dur="0.4s" to="1" fill="freeze"/>
          <image href="icons/nextjs.svg" x="540" y="380" width="48" height="48"/>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="3.5s" dur="0.4s" to="1" fill="freeze"/>
          <image href="icons/nodejs.svg" x="600" y="380" width="48" height="48"/>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="3.6s" dur="0.4s" to="1" fill="freeze"/>
          <image href="icons/ts.svg" x="660" y="380" width="48" height="48"/>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="3.7s" dur="0.4s" to="1" fill="freeze"/>
          <image href="icons/tailwind.svg" x="720" y="380" width="48" height="48"/>
        </g>

        <!-- row 2 -->
        <g opacity="0">
          <animate attributeName="opacity" begin="3.8s" dur="0.4s" to="1" fill="freeze"/>
          <image href="icons/python.svg" x="480" y="440" width="48" height="48"/>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="3.9s" dur="0.4s" to="1" fill="freeze"/>
          <image href="icons/docker.svg" x="540" y="440" width="48" height="48"/>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="4.0s" dur="0.4s" to="1" fill="freeze"/>
          <image href="icons/postgres.svg" x="600" y="440" width="48" height="48"/>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="4.1s" dur="0.4s" to="1" fill="freeze"/>
          <image href="icons/aws.svg" x="660" y="440" width="48" height="48"/>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" begin="4.2s" dur="0.4s" to="1" fill="freeze"/>
          <image href="icons/git.svg" x="720" y="440" width="48" height="48"/>
        </g>
      </g>

      <!-- social icons -->
      <g opacity="0" transform="translate(0, 22)">
        <animate attributeName="opacity" begin="4.5s" dur="0.6s" to="1" fill="freeze"/>
        <text x="480" y="490" font-size="12" letter-spacing="2" fill="#94A3B8">CONNECT</text>

        <g filter="url(#pulseGlow)">
          <circle cx="492" cy="520" r="20" fill="#0F172A" stroke="url(#pillBorder)" stroke-width="1.2"/>
          <path d="M492 508c-6.6 0-12 5.4-12 12 0 5.3 3.4 9.8 8.2 11.4.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.8.1-.8.1-.8 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11 11 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.3v3.4c0 .3.2.7.8.6 4.8-1.6 8.2-6.1 8.2-11.4 0-6.6-5.4-12-12-12z" fill="#F8FAFC"/>
        </g>

        <g filter="url(#pulseGlow)">
          <circle cx="552" cy="520" r="20" fill="#0F172A" stroke="url(#pillBorder)" stroke-width="1.2"/>
          <path d="M545 513h4.6v2.4h.1c.6-1.1 2.2-2.4 4.6-2.4 4.9 0 5.8 3 5.8 7v8.1h-4.8v-7.2c0-1.7 0-4-2.5-4s-2.8 1.9-2.8 3.9v7.3H545V513zM539.8 513h4.8v15.1h-4.8V513zM542.2 506.6a2.8 2.8 0 1 1 0 5.6 2.8 2.8 0 0 1 0-5.6z" fill="#F8FAFC"/>
        </g>

        <g filter="url(#pulseGlow)">
          <circle cx="612" cy="520" r="20" fill="#0F172A" stroke="url(#pillBorder)" stroke-width="1.2"/>
          <path d="M601 512h22a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-22a2 2 0 0 1-2-2v-12a2 2 0 0 1 2-2zm1 2.6v.1l10 7 10-7v-.1h-20zm20 2.4l-10 7-10-7v9h20v-9z" fill="#F8FAFC"/>
        </g>

        <g filter="url(#pulseGlow)">
          <circle cx="672" cy="520" r="20" fill="#0F172A" stroke="url(#pillBorder)" stroke-width="1.2"/>
          <path d="M662 528l7-16 3 7 7-11-3 20-6-8-8 8z" fill="none" stroke="#F8FAFC" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
        </g>
      </g>
    </g>
  </g>

  <!-- outer border shimmer -->
  <rect x="4" y="4" width="1172" height="602" rx="26" fill="none" stroke="url(#borderShimmer)" stroke-width="1.4"/>
  <rect x="4" y="4" width="1172" height="602" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
</svg>
